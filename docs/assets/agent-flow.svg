<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="500" y="44" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Agentic Analytics System</text>
  <text x="500" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b92a5">Ask a business question. Get a decision-ready action. Minutes, not days.</text>

  <!-- Arrow lines between nodes -->
  <line x1="192" y1="160" x2="248" y2="160" stroke="#3a3f55" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="442" y1="160" x2="498" y2="160" stroke="#3a3f55" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="692" y1="160" x2="748" y2="160" stroke="#3a3f55" stroke-width="2" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3a3f55"/>
    </marker>
  </defs>

  <!-- ── CARD 1: FRAME ── -->
  <rect x="20" y="100" width="172" height="120" rx="10" fill="#1e2235" stroke="#f5a623" stroke-width="1.5"/>
  <circle cx="60" cy="133" r="14" fill="none" stroke="#f5a623" stroke-width="2"/>
  <text x="60" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#f5a623">1</text>
  <text x="106" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5a623">FRAME</text>
  <text x="106" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Structure the question</text>
  <line x1="30" y1="165" x2="182" y2="165" stroke="#2a2f45" stroke-width="1"/>
  <circle cx="36" cy="180" r="3" fill="#f5a623"/>
  <text x="46" y="184" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">State hypotheses</text>
  <circle cx="36" cy="198" r="3" fill="#f5a623"/>
  <text x="46" y="202" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">Competing explanations</text>
  <circle cx="36" cy="216" r="3" fill="#f5a623"/>
  <text x="46" y="220" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">Testing order + why</text>

  <!-- ── CARD 2: ANALYZE ── -->
  <rect x="250" y="100" width="192" height="120" rx="10" fill="#1e2235" stroke="#e8734a" stroke-width="1.5"/>
  <circle cx="290" cy="133" r="14" fill="none" stroke="#e8734a" stroke-width="2"/>
  <text x="290" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#e8734a">2</text>
  <text x="346" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e8734a">ANALYZE</text>
  <text x="346" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Find the answer</text>
  <line x1="260" y1="165" x2="432" y2="165" stroke="#2a2f45" stroke-width="1"/>
  <circle cx="266" cy="180" r="3" fill="#e8734a"/>
  <text x="276" y="184" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">Profile the market</text>
  <circle cx="266" cy="198" r="3" fill="#e8734a"/>
  <text x="276" y="202" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">Run multi-tool analysis</text>
  <circle cx="266" cy="216" r="3" fill="#e8734a"/>
  <text x="276" y="220" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">Drill to root cause</text>

  <!-- ── CARD 3: DECIDE ── -->
  <rect x="500" y="100" width="192" height="120" rx="10" fill="#1e2235" stroke="#7c5cbf" stroke-width="1.5"/>
  <circle cx="540" cy="133" r="14" fill="none" stroke="#7c5cbf" stroke-width="2"/>
  <text x="540" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#7c5cbf">3</text>
  <text x="596" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#7c5cbf">DECIDE</text>
  <text x="596" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Quantify the impact</text>
  <line x1="510" y1="165" x2="682" y2="165" stroke="#2a2f45" stroke-width="1"/>
  <circle cx="516" cy="180" r="3" fill="#7c5cbf"/>
  <text x="526" y="184" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">Severity classification</text>
  <circle cx="516" cy="198" r="3" fill="#7c5cbf"/>
  <text x="526" y="202" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">Dollar impact estimate</text>
  <circle cx="516" cy="216" r="3" fill="#7c5cbf"/>
  <text x="526" y="220" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">Confidence score</text>

  <!-- ── CARD 4: ACT ── -->
  <rect x="750" y="100" width="192" height="120" rx="10" fill="#1e2235" stroke="#2ea87e" stroke-width="2"/>
  <circle cx="790" cy="133" r="14" fill="none" stroke="#2ea87e" stroke-width="2"/>
  <text x="790" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#2ea87e">4</text>
  <text x="846" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#2ea87e">ACT</text>
  <text x="846" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Deliver the decision</text>
  <line x1="760" y1="165" x2="932" y2="165" stroke="#2a2f45" stroke-width="1"/>
  <circle cx="766" cy="180" r="3" fill="#2ea87e"/>
  <text x="776" y="184" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">Decision Packet output</text>
  <circle cx="766" cy="198" r="3" fill="#2ea87e"/>
  <text x="776" y="202" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">Owner + deadline assigned</text>
  <circle cx="766" cy="216" r="3" fill="#2ea87e"/>
  <text x="776" y="220" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">Slack / briefing / JSON</text>

  <!-- ── OUTPUT BOX ── -->
  <rect x="750" y="240" width="192" height="70" rx="8" fill="#0d1f17" stroke="#2ea87e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="846" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#2ea87e">Decision Packet</text>
  <text x="846" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Issue · Severity · Impact $</text>
  <text x="846" y="293" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Action · Owner · Deadline</text>

  <!-- ── BOTTOM FEATURE PILLS ── -->
  <!-- Pill 1 -->
  <rect x="20" y="360" width="220" height="72" rx="8" fill="#161a28" stroke="#2a2f45" stroke-width="1"/>
  <text x="110" y="384" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#f5a623">Proactive by Default</text>
  <text x="110" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Runs at 6am daily.</text>
  <text x="110" y="418" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">No question required.</text>

  <!-- Pill 2 -->
  <rect x="260" y="360" width="220" height="72" rx="8" fill="#161a28" stroke="#2a2f45" stroke-width="1"/>
  <text x="370" y="384" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#e8734a">Self-Improving</text>
  <text x="370" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Tracks predictions vs outcomes.</text>
  <text x="370" y="418" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Recalibrates confidence weights.</text>

  <!-- Pill 3 -->
  <rect x="500" y="360" width="220" height="72" rx="8" fill="#161a28" stroke="#2a2f45" stroke-width="1"/>
  <text x="610" y="384" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#7c5cbf">Dollar-Grounded</text>
  <text x="610" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Every signal translated to</text>
  <text x="610" y="418" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">homes/month + margin $.</text>

  <!-- Pill 4 -->
  <rect x="740" y="360" width="220" height="72" rx="8" fill="#161a28" stroke="#2a2f45" stroke-width="1"/>
  <text x="850" y="384" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#2ea87e">Native Tool Use</text>
  <text x="850" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Claude Opus 4.6 · No wrappers.</text>
  <text x="850" y="418" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Direct Anthropic SDK.</text>

  <!-- ── FOOTER ── -->
  <line x1="20" y1="455" x2="980" y2="455" stroke="#2a2f45" stroke-width="1"/>
  <text x="500" y="478" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3d4463">Opendoor Agentic Analytics System</text>
  <text x="500" y="498" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3d4463">github.com/ronokelishek/opendoor-agent</text>
</svg>
