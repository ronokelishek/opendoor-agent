<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" width="1100" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1" />
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3a3f55"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="500" fill="url(#bgGrad)" rx="14"/>

  <!-- Title -->
  <text x="550" y="46" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Agentic Analytics System</text>
  <text x="550" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b92a5">Your question in plain English → a decision-ready action packet. No dashboard. No waiting.</text>

  <!-- ── CONNECTOR ARROWS ── -->
  <line x1="222" y1="162" x2="258" y2="162" stroke="#3a3f55" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="482" y1="162" x2="518" y2="162" stroke="#3a3f55" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="742" y1="162" x2="778" y2="162" stroke="#3a3f55" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- CARD 1 — FRAME  (x=22, w=230) -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="22" y="92" width="230" height="148" rx="10" fill="#1e2235" stroke="#f5a623" stroke-width="1.5"/>
  <!-- number circle -->
  <circle cx="60" cy="122" r="14" fill="none" stroke="#f5a623" stroke-width="2"/>
  <text x="60" y="127" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#f5a623">1</text>
  <!-- label -->
  <text x="137" y="119" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5a623">FRAME</text>
  <text x="137" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Structure the question</text>
  <line x1="32" y1="148" x2="242" y2="148" stroke="#2a2f45" stroke-width="1"/>
  <!-- bullets -->
  <circle cx="40" cy="165" r="3" fill="#f5a623"/>
  <text x="52" y="169" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">State hypotheses</text>
  <circle cx="40" cy="186" r="3" fill="#f5a623"/>
  <text x="52" y="190" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">Competing explanations</text>
  <circle cx="40" cy="207" r="3" fill="#f5a623"/>
  <text x="52" y="211" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">Testing order + why</text>
  <circle cx="40" cy="228" r="3" fill="#f5a623"/>
  <text x="52" y="232" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">Design analysis plan</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- CARD 2 — ANALYZE  (x=262, w=230) -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="262" y="92" width="230" height="148" rx="10" fill="#1e2235" stroke="#e8734a" stroke-width="1.5"/>
  <circle cx="300" cy="122" r="14" fill="none" stroke="#e8734a" stroke-width="2"/>
  <text x="300" y="127" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#e8734a">2</text>
  <text x="377" y="119" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e8734a">ANALYZE</text>
  <text x="377" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Find the answer</text>
  <line x1="272" y1="148" x2="482" y2="148" stroke="#2a2f45" stroke-width="1"/>
  <circle cx="280" cy="165" r="3" fill="#e8734a"/>
  <text x="292" y="169" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">Profile market data</text>
  <circle cx="280" cy="186" r="3" fill="#e8734a"/>
  <text x="292" y="190" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">Multi-tool analysis loop</text>
  <circle cx="280" cy="207" r="3" fill="#e8734a"/>
  <text x="292" y="211" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">Drill to root cause</text>
  <circle cx="280" cy="228" r="3" fill="#e8734a"/>
  <text x="292" y="232" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">Size the opportunity</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- CARD 3 — DECIDE  (x=522, w=230) -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="522" y="92" width="230" height="148" rx="10" fill="#1e2235" stroke="#7c5cbf" stroke-width="1.5"/>
  <circle cx="560" cy="122" r="14" fill="none" stroke="#7c5cbf" stroke-width="2"/>
  <text x="560" y="127" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#7c5cbf">3</text>
  <text x="637" y="119" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#7c5cbf">DECIDE</text>
  <text x="637" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Quantify the impact</text>
  <line x1="532" y1="148" x2="742" y2="148" stroke="#2a2f45" stroke-width="1"/>
  <circle cx="540" cy="165" r="3" fill="#7c5cbf"/>
  <text x="552" y="169" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">Severity classification</text>
  <circle cx="540" cy="186" r="3" fill="#7c5cbf"/>
  <text x="552" y="190" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">Dollar impact estimate</text>
  <circle cx="540" cy="207" r="3" fill="#7c5cbf"/>
  <text x="552" y="211" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">Confidence score</text>
  <circle cx="540" cy="228" r="3" fill="#7c5cbf"/>
  <text x="552" y="232" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">Validate before output</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- CARD 4 — ACT  (x=782, w=230) -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="782" y="92" width="296" height="148" rx="10" fill="#0d1f17" stroke="#2ea87e" stroke-width="2"/>
  <circle cx="820" cy="122" r="14" fill="none" stroke="#2ea87e" stroke-width="2"/>
  <text x="820" y="127" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#2ea87e">4</text>
  <text x="930" y="119" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#2ea87e">ACT</text>
  <text x="930" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Deliver the decision</text>
  <line x1="792" y1="148" x2="1068" y2="148" stroke="#2a2f45" stroke-width="1"/>
  <!-- right column bullets -->
  <circle cx="800" cy="165" r="3" fill="#2ea87e"/>
  <text x="812" y="169" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">Decision Packet output</text>
  <circle cx="800" cy="186" r="3" fill="#2ea87e"/>
  <text x="812" y="190" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">Owner + deadline assigned</text>
  <circle cx="800" cy="207" r="3" fill="#2ea87e"/>
  <text x="812" y="211" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">Slack · briefing · JSON</text>
  <circle cx="800" cy="228" r="3" fill="#2ea87e"/>
  <text x="812" y="232" font-family="system-ui, sans-serif" font-size="10.5" fill="#9ca3af">Feedback loop logged</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- BOTTOM FEATURE PILLS  -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Pill 1 -->
  <rect x="22" y="268" width="248" height="78" rx="8" fill="#161a28" stroke="#2a2f45" stroke-width="1"/>
  <text x="146" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#f5a623">Proactive by Default</text>
  <text x="146" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Runs at 6am daily without</text>
  <text x="146" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">any prompt or question.</text>

  <!-- Pill 2 -->
  <rect x="286" y="268" width="248" height="78" rx="8" fill="#161a28" stroke="#2a2f45" stroke-width="1"/>
  <text x="410" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#e8734a">Self-Improving</text>
  <text x="410" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Tracks predictions vs outcomes.</text>
  <text x="410" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Recalibrates confidence weights.</text>

  <!-- Pill 3 -->
  <rect x="550" y="268" width="248" height="78" rx="8" fill="#161a28" stroke="#2a2f45" stroke-width="1"/>
  <text x="674" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#7c5cbf">Dollar-Grounded</text>
  <text x="674" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Every signal becomes</text>
  <text x="674" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">homes/month + margin $.</text>

  <!-- Pill 4 -->
  <rect x="814" y="268" width="264" height="78" rx="8" fill="#161a28" stroke="#2a2f45" stroke-width="1"/>
  <text x="946" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#2ea87e">Native Tool Use</text>
  <text x="946" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Claude Opus 4.6 · No wrappers.</text>
  <text x="946" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Direct Anthropic SDK.</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- FOOTER -->
  <!-- ══════════════════════════════════════════ -->
  <line x1="22" y1="368" x2="1078" y2="368" stroke="#2a2f45" stroke-width="1"/>
  <text x="550" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3d4463">Opendoor Agentic Analytics System  ·  github.com/ronokelishek/opendoor-agent</text>
</svg>
